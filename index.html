<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayiti Start</title>
    <meta name="description" content="A splash page for a startup in Haiti">

    <link rel="stylesheet" href="mvp.css">
    <link rel="stylesheet" href="screen.css">
</head>
<body>

    <main class="splash-wrapper">
        <section class="splash-card">
            <div class="left-panel">
                <p class="small-tag">Startup in Haiti</p>
                <h1>Helping small businesses build their brand online</h1>
                <p class="intro">
                    Ayiti Start is a startup idea focused on helping Haitian businesses grow
                    through simple digital tools, online visibility, and stronger customer connection.
                </p>

                <form>
                    <label for="name">First name</label>
                    <input type="text" id="name" name="name" placeholder="First name">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="email@website.com">

                    <button type="submit">Get Started</button>
                </form>
            </div>

            <div class="right-panel">
                <div class="visual-card">
                    <h2>AYITI START</h2>
                    <p>Digital tools for Haitian entrepreneurs</p>
                </div>
            </div>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
